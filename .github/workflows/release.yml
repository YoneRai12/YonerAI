name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Verify Tag and VERSION
        run: |
          python scripts/verify_version.py --tag "${GITHUB_REF_NAME}"

      - name: Read VERSION
        run: |
          ORA_VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "ORA_VERSION=$ORA_VERSION" >> $GITHUB_ENV

      - name: Read PRODUCT_NAME
        run: |
          PRODUCT_NAME=$(cat PRODUCT_NAME | tr -d '[:space:]')
          echo "PRODUCT_NAME=$PRODUCT_NAME" >> $GITHUB_ENV

      - name: Verify Release Notes Exist
        run: |
          test -f "docs/releases/${ORA_VERSION}.md"

      - name: Read Release Title
        run: |
          RELEASE_TITLE=$(python - <<'PY'
          from pathlib import Path
          import os

          version = os.environ["ORA_VERSION"]
          release_note = Path("docs/releases") / f"{version}.md"
          title = f"YonerAI {version}"
          for line in release_note.read_text(encoding="utf-8").splitlines():
              if line.startswith("# "):
                  title = line[2:].strip()
                  break
          print(title)
          PY
          )
          echo "RELEASE_TITLE=$RELEASE_TITLE" >> "$GITHUB_ENV"

      - name: Classify Release Channel
        run: |
          case "$ORA_VERSION" in
            *-alpha|*-alpha.*|*-alpha+*|*-beta|*-beta.*|*-beta+*|*-rc|*-rc.*|*-rc+*)
              echo "ORA_PRERELEASE=true" >> "$GITHUB_ENV"
              ;;
            *)
              echo "ORA_PRERELEASE=false" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Generate Release Archive
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          python scripts/create_release.py "$VERSION"

      - name: Run Release Gate
        run: |
          python scripts/release_gate.py \
            --tag "${GITHUB_REF_NAME}" \
            --artifact "${PRODUCT_NAME}-${ORA_VERSION}.zip" \
            --github-prerelease "${ORA_PRERELEASE}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.PRODUCT_NAME }}-*.zip
          # Publish automatically (no manual "Draft -> Publish" step in the GitHub UI).
          draft: false
          prerelease: ${{ env.ORA_PRERELEASE }}
          name: ${{ env.RELEASE_TITLE }}
          body_path: docs/releases/${{ env.ORA_VERSION }}.md
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
