version: '3.8'

services:
  # YonerAI legacy bot runtime.
  ora-bot:
    build: .
    container_name: ora-bot
    restart: always
    env_file: .env
    volumes:
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python main.py

  # Legacy web backend.
  ora-web:
    build: .
    container_name: ora-web
    restart: always
    env_file: .env
    ports:
      - "8000:8000"
    command: uvicorn src.web.app:app --host 0.0.0.0 --port 8000
    depends_on:
      - ora-bot
