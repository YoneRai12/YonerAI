version: '3.8'

services:
  # YonerAI legacy bot runtime.
  ora-bot:
    build: .
    container_name: ora-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
      - ./data:/app/data
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: python main.py
    stdin_open: true
    tty: true

  # Legacy web backend.
  ora-web:
    build: .
    container_name: ora-web
    restart: unless-stopped
    env_file: .env
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: uvicorn src.web.app:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - ora-bot
