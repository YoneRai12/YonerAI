<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YonerAI Chat</title>
  <meta name="description" content="YonerAI managed cloud chat" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/site.css?v=20260401_01" />
  <script defer src="/static/site.js?v=20260401_01"></script>
</head>
<body class="site-chat">
  <div class="chat-shell">
    <aside class="chat-sidebar glass-card">
      <a class="brand-mark" href="/">YonerAI</a>
      <p class="sidebar-copy">
        Official Managed Cloud の最小 chat 面です。
        Google ログイン後、メッセージ送信と SSE 応答だけを公開します。
      </p>
      <div class="session-box">
        <div id="session-state" class="session-state">セッションを確認しています…</div>
        <div id="session-user" class="session-user" hidden></div>
        <div class="session-actions">
          <a id="login-btn" class="btn btn-primary" data-google-login href="/api/auth/google/start?returnTo=/jp/chat">Google でログイン</a>
          <button id="logout-btn" class="btn btn-secondary" type="button" hidden>ログアウト</button>
        </div>
      </div>
    </aside>

    <main class="chat-main glass-card">
      <header class="chat-topbar">
        <div>
          <p class="eyebrow">Managed Cloud MVP</p>
          <h1>YonerAI Chat</h1>
        </div>
        <a class="ghost-link" href="/">トップへ戻る</a>
      </header>

      <section id="message-list" class="message-list" aria-live="polite"></section>

      <div id="status-box" class="status-box" hidden></div>

      <form id="chat-form" class="compose-form">
        <textarea id="chat-input" class="compose-input" rows="3" placeholder="YonerAI にメッセージを送る" required></textarea>
        <div class="compose-actions">
          <span class="compose-hint">最初の MVP では添付なし / 1 会話面のみです。</span>
          <button id="send-btn" class="btn btn-primary" type="submit">送信</button>
        </div>
      </form>
    </main>
  </div>

  <script>
    (() => {
      "use strict";

      const app = window.YonerAIWeb;
      const apiBase = app.resolveApiBase();
      const messageList = document.getElementById("message-list");
      const statusBox = document.getElementById("status-box");
      const chatForm = document.getElementById("chat-form");
      const chatInput = document.getElementById("chat-input");
      const sendBtn = document.getElementById("send-btn");
      const sessionState = document.getElementById("session-state");
      const sessionUser = document.getElementById("session-user");
      const loginBtn = document.getElementById("login-btn");
      const logoutBtn = document.getElementById("logout-btn");

      let me = null;
      let pendingBubble = null;

      function showStatus(text, isError = false) {
        statusBox.hidden = false;
        statusBox.textContent = text;
        statusBox.classList.toggle("status-error", Boolean(isError));
      }

      function clearStatus() {
        statusBox.hidden = true;
        statusBox.textContent = "";
        statusBox.classList.remove("status-error");
      }

      function addBubble(role, text) {
        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const label = document.createElement("div");
        label.className = "message-role";
        label.textContent = role === "user" ? "You" : "YonerAI";

        const bubble = document.createElement("div");
        bubble.className = "message-bubble";
        bubble.textContent = text;

        row.appendChild(label);
        row.appendChild(bubble);
        messageList.appendChild(row);
        messageList.scrollTop = messageList.scrollHeight;
        return bubble;
      }

      function setAuthedUI() {
        if (!me) {
          sessionState.textContent = "Google ログインが必要です。";
          sessionUser.hidden = true;
          logoutBtn.hidden = true;
          loginBtn.hidden = false;
          chatInput.disabled = true;
          sendBtn.disabled = true;
          return;
        }
        sessionState.textContent = "ログイン済み";
        sessionUser.hidden = false;
        sessionUser.textContent = `${me.display_name || me.user_id} (${me.provider})`;
        logoutBtn.hidden = false;
        loginBtn.hidden = true;
        chatInput.disabled = false;
        sendBtn.disabled = false;
      }

      async function refreshSession() {
        loginBtn.href = app.resolveGoogleStartHref("/jp/chat");
        try {
          const response = await fetch(`${apiBase}/api/auth/me`, {
            credentials: "include",
            headers: { "Accept": "application/json" },
          });
          if (!response.ok) {
            me = null;
            setAuthedUI();
            return;
          }
          me = await response.json();
          setAuthedUI();
        } catch (error) {
          me = null;
          sessionState.textContent = `セッション確認に失敗しました: ${error.message}`;
          setAuthedUI();
        }
      }

      async function logout() {
        await fetch(`${apiBase}/api/auth/logout`, {
          method: "POST",
          credentials: "include",
        });
        me = null;
        setAuthedUI();
      }

      async function sendMessage(content) {
        const idem = crypto.randomUUID();
        const response = await fetch(`${apiBase}/api/public/chat/messages`, {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json",
            "Idempotency-Key": idem,
          },
          body: JSON.stringify({ content, idempotency_key: idem }),
        });
        if (!response.ok) {
          const detail = await response.text();
          throw new Error(detail || `HTTP ${response.status}`);
        }
        return response.json();
      }

      function streamRun(runId) {
        return new Promise((resolve, reject) => {
          pendingBubble = addBubble("assistant", "");
          let finalText = "";
          const eventSource = new EventSource(`${apiBase}/api/public/chat/runs/${encodeURIComponent(runId)}/events`, { withCredentials: true });

          eventSource.onmessage = (event) => {
            let payload;
            try {
              payload = JSON.parse(event.data);
            } catch {
              return;
            }
            const kind = payload.event;
            const data = payload.data || {};
            if (kind === "progress") {
              showStatus(`処理中: ${data.stage || "working"}`);
              return;
            }
            if (kind === "delta") {
              finalText += String(data.text || "");
              pendingBubble.textContent = finalText;
              return;
            }
            if (kind === "final") {
              finalText = String(data.text || data.output_text || finalText || "");
              pendingBubble.textContent = finalText || "(empty)";
              clearStatus();
              eventSource.close();
              resolve();
              return;
            }
            if (kind === "error") {
              eventSource.close();
              reject(new Error(String(data.message || "unknown error")));
            }
          };

          eventSource.onerror = () => {
            eventSource.close();
            reject(new Error("SSE 接続が切れました"));
          };
        });
      }

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearStatus();
        if (!me) {
          showStatus("先に Google ログインが必要です。", true);
          return;
        }

        const content = chatInput.value.trim();
        if (!content) return;

        addBubble("user", content);
        chatInput.value = "";
        chatInput.disabled = true;
        sendBtn.disabled = true;

        try {
          const result = await sendMessage(content);
          await streamRun(result.run_id);
        } catch (error) {
          if (pendingBubble && !pendingBubble.textContent) {
            pendingBubble.textContent = "応答の取得に失敗しました。";
          }
          showStatus(`失敗: ${error.message}`, true);
        } finally {
          chatInput.disabled = false;
          sendBtn.disabled = false;
          chatInput.focus();
        }
      });

      logoutBtn.addEventListener("click", async () => {
        await logout();
      });

      refreshSession();
    })();
  </script>
</body>
</html>
