<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YonerAI Chat</title>
  <meta name="description" content="YonerAI Chat" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Sans+JP:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/static/site.css?v=20260401_03" />
  <script src="/static/site.js?v=20260401_03"></script>
</head>

<body class="console preload" data-console-page="chat">
  <a class="skip-link" href="#main">メインコンテンツへスキップ</a>

  <div class="console-app">
    <aside class="console-sidebar" aria-label="Sidebar" data-sidebar>
      <div class="console-brand">
        <a class="console-logo" href="/" aria-label="YonerAI home">YonerAI</a>
      </div>

      <div class="console-actions">
        <button class="console-newchat" id="new-chat-btn" type="button">
          <span class="console-plus" aria-hidden="true">+</span>
          <span>New chat</span>
        </button>
      </div>

      <div class="console-section">
        <div class="console-section-label">Chats</div>
        <nav id="thread-list" class="thread-list" aria-label="Chat threads">
          <div class="thread-item is-active">
            <span class="thread-title">Managed Cloud MVP</span>
          </div>
        </nav>
      </div>

      <div class="console-spacer"></div>

      <div id="auth-box" class="console-auth" aria-label="Auth">
        <div class="console-user">
          <div id="session-state" class="console-user-label">セッションを確認しています…</div>
          <div id="session-user" class="console-user-sub" hidden></div>
        </div>
        <div class="console-auth-actions">
          <a
            class="console-btn primary"
            id="login-btn"
            data-google-login
            data-return-to="/jp/chat"
            href="/api/auth/google/start?returnTo=/jp/chat"
          >Google でログイン</a>
          <button class="console-btn" id="logout-btn" type="button" hidden>ログアウト</button>
        </div>
      </div>
    </aside>

    <main id="main" class="console-main" aria-label="Chat">
      <header class="console-topbar" aria-label="Top bar">
        <div class="console-topbar-title">
          <span>YonerAI Chat</span>
        </div>
        <div class="console-topbar-right">
          <a class="console-pill" href="/">Top</a>
        </div>
      </header>

      <section class="chat-shell" aria-label="Conversation">
        <div id="status-box" class="chat-status" hidden role="status" aria-live="polite">
          <span class="chat-status-dot" aria-hidden="true"></span>
          <span id="status-box-text" class="chat-status-text"></span>
        </div>

        <div class="chat-empty">
          <h1>What can I help with?</h1>
          <p class="muted">
            本命デザインを維持したまま、最小の public-safe chat だけを通しています。
          </p>
        </div>

        <div id="message-list" class="chat-scroll" role="log" aria-live="polite" aria-relevant="additions text"></div>

        <form id="chat-form" class="chat-compose" autocomplete="off">
          <div class="compose-wrap">
            <textarea
              id="chat-input"
              class="compose-input"
              rows="1"
              required
              placeholder="YonerAIにメッセージ…"
            ></textarea>
            <button class="compose-send" id="send-btn" type="submit" aria-label="Send">
              <span aria-hidden="true">↵</span>
            </button>
          </div>
          <div class="compose-note muted">
            いまは session 確認、メッセージ送信、SSE 応答だけを通しています。
          </div>
        </form>
      </section>
    </main>
  </div>

  <script>
    (() => {
      "use strict";

      const app = window.YonerAIWeb;
      if (!app) {
        return;
      }

      const apiBase = app.resolveApiBase();
      const messageList = document.getElementById("message-list");
      const statusBox = document.getElementById("status-box");
      const statusBoxText = document.getElementById("status-box-text");
      const chatForm = document.getElementById("chat-form");
      const chatInput = document.getElementById("chat-input");
      const sendBtn = document.getElementById("send-btn");
      const sessionState = document.getElementById("session-state");
      const sessionUser = document.getElementById("session-user");
      const loginBtn = document.getElementById("login-btn");
      const logoutBtn = document.getElementById("logout-btn");
      const newChatBtn = document.getElementById("new-chat-btn");

      let me = null;
      let pendingBubble = null;

      function showStatus(text, isError = false) {
        statusBox.hidden = false;
        statusBoxText.textContent = text;
        statusBox.classList.toggle("is-error", Boolean(isError));
        statusBox.classList.toggle("is-working", !isError);
      }

      function clearStatus() {
        statusBox.hidden = true;
        statusBoxText.textContent = "";
        statusBox.classList.remove("is-error");
        statusBox.classList.remove("is-working");
      }

      function addBubble(role, text) {
        const row = document.createElement("div");
        row.className = `msg ${role === "user" ? "is-user" : "is-assistant"}`;

        const bubble = document.createElement("article");
        bubble.className = "msg-bubble";
        bubble.textContent = text;

        row.appendChild(bubble);
        messageList.appendChild(row);
        messageList.scrollTop = messageList.scrollHeight;
        return bubble;
      }

      function setAuthedUI() {
        if (!me) {
          sessionState.textContent = "Google ログインが必要です。";
          sessionUser.hidden = true;
          loginBtn.hidden = false;
          logoutBtn.hidden = true;
          chatInput.disabled = true;
          sendBtn.disabled = true;
          return;
        }

        sessionState.textContent = "ログイン済み";
        sessionUser.hidden = false;
        sessionUser.textContent = `${me.display_name || me.user_id} (${me.provider})`;
        loginBtn.hidden = true;
        logoutBtn.hidden = false;
        chatInput.disabled = false;
        sendBtn.disabled = false;
      }

      async function refreshSession() {
        loginBtn.href = app.resolveGoogleStartHref("/jp/chat");
        try {
          const response = await fetch(`${apiBase}/api/auth/me`, {
            credentials: "include",
            headers: { "Accept": "application/json" },
          });
          if (!response.ok) {
            me = null;
            setAuthedUI();
            return;
          }
          me = await response.json();
          setAuthedUI();
        } catch (error) {
          me = null;
          setAuthedUI();
          showStatus(`セッション確認に失敗しました: ${error.message}`, true);
        }
      }

      async function logout() {
        await fetch(`${apiBase}/api/auth/logout`, {
          method: "POST",
          credentials: "include",
        });
        me = null;
        setAuthedUI();
      }

      async function sendMessage(content) {
        const idem = crypto.randomUUID();
        const response = await fetch(`${apiBase}/api/public/chat/messages`, {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json",
            "Idempotency-Key": idem,
          },
          body: JSON.stringify({ content, idempotency_key: idem }),
        });
        if (!response.ok) {
          const detail = await response.text();
          throw new Error(detail || `HTTP ${response.status}`);
        }
        return response.json();
      }

      function streamRun(runId) {
        return new Promise((resolve, reject) => {
          pendingBubble = addBubble("assistant", "");
          let finalText = "";
          const eventSource = new EventSource(
            `${apiBase}/api/public/chat/runs/${encodeURIComponent(runId)}/events`,
            { withCredentials: true }
          );

          eventSource.onmessage = (event) => {
            let payload;
            try {
              payload = JSON.parse(event.data);
            } catch {
              return;
            }

            const kind = payload.event;
            const data = payload.data || {};
            if (kind === "progress") {
              showStatus(`処理中: ${data.stage || "working"}`);
              return;
            }
            if (kind === "delta") {
              finalText += String(data.text || "");
              pendingBubble.textContent = finalText;
              return;
            }
            if (kind === "final") {
              finalText = String(data.text || data.output_text || finalText || "");
              pendingBubble.textContent = finalText || "(empty)";
              clearStatus();
              eventSource.close();
              resolve();
              return;
            }
            if (kind === "error") {
              eventSource.close();
              reject(new Error(String(data.message || "unknown error")));
            }
          };

          eventSource.onerror = () => {
            eventSource.close();
            reject(new Error("SSE 接続が切れました"));
          };
        });
      }

      newChatBtn.addEventListener("click", () => {
        messageList.innerHTML = "";
        clearStatus();
        chatInput.focus();
      });

      chatForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        clearStatus();
        if (!me) {
          showStatus("先に Google ログインが必要です。", true);
          return;
        }

        const content = chatInput.value.trim();
        if (!content) {
          return;
        }

        addBubble("user", content);
        chatInput.value = "";
        chatInput.disabled = true;
        sendBtn.disabled = true;

        try {
          const result = await sendMessage(content);
          await streamRun(result.run_id);
        } catch (error) {
          if (pendingBubble && !pendingBubble.textContent) {
            pendingBubble.textContent = "応答の生成に失敗しました。";
          }
          showStatus(`失敗: ${error.message}`, true);
        } finally {
          chatInput.disabled = false;
          sendBtn.disabled = false;
          chatInput.focus();
        }
      });

      logoutBtn.addEventListener("click", async () => {
        await logout();
      });

      refreshSession();
    })();
  </script>
</body>
</html>
